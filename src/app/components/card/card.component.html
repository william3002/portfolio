<div class="container rounded-3 border border-1 border-black my-4 px-0 d-flex flex-column">
    <img class="rounded-top-3 border border-bottom img-thumbnail" [src]="imgProjeto" alt="">
    <div id="card_description" class="px-3 py-2 rounded-bottom-3 d-flex flex-column flex-grow-1">
        <h3 class="text-center my-3">{{titulo}}</h3>
        <p>{{description}}</p>
        <div class="mt-auto">
            <button class="btn border border-white mb-3">
                <a class="text-decoration-none" [href]="linkProjeto">Acessar</a>
            </button>
        </div>
    </div>
</div>
